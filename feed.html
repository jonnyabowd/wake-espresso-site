<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram — Wake Espresso</title>
  <link rel="stylesheet" href="css/tokens.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #fff;
      padding: var(--space-lg) var(--space-md);
    }

    .feed-header {
      text-align: center;
      margin-bottom: var(--space-md);
    }

    .feed-header a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: #111;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .feed-header a svg {
      width: 20px;
      height: 20px;
    }

    .feed-header h2 {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 10px;
    }

    .feed-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      max-width: 900px;
      margin: 0 auto;
    }

    .feed-item {
      position: relative;
      aspect-ratio: 1;
      overflow: hidden;
      background: #f0f0f0;
      cursor: pointer;
    }

    .feed-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }

    .feed-item:hover img {
      transform: scale(1.04);
    }

    .feed-item:hover .overlay {
      opacity: 1;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(12, 192, 223, 0.35);
      opacity: 0;
      transition: opacity 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .overlay svg {
      width: 32px;
      height: 32px;
      fill: white;
    }

    .feed-footer {
      text-align: center;
      margin-top: var(--space-md);
    }

    .feed-footer a {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--color-brand-blue);
      text-decoration: none;
      border: 1.5px solid var(--color-brand-blue);
      padding: 8px 20px;
      border-radius: 2px;
      transition: background 0.2s, color 0.2s;
    }

    .feed-footer a:hover {
      background: var(--color-brand-blue);
      color: white;
    }

    @media (max-width: 500px) {
      .feed-grid {
        gap: 2px;
      }
    }
  </style>
</head>
